<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nome do Negócio</title>
  <meta name="description" content="Descrição curta do negócio e atendimento pelo WhatsApp.">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #222;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    .badge {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eef2ff;
      font-size: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.1;
    }

    p {
      margin: 0 0 24px;
      font-size: 18px;
      line-height: 1.5;
      color: #555;
    }

    .btn {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 10px;
      background: #25D366;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
    }

    .info {
      margin-top: 20px;
      font-size: 14px;
      color: #777;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 28px;
      }

      p {
        font-size: 16px;
      }

      .card {
        padding: 24px 18px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="card">
      <div class="badge">Atendimento rápido</div>
      <h1>Nome do Negócio</h1>
      <p>Descrição curta do serviço. Fale agora pelo WhatsApp e tire suas dúvidas.</p>
      <a class="btn" href="https://wa.me/5592999999999" target="_blank">Fale no WhatsApp</a>
      <div class="info">Segunda a sábado • Atendimento online</div>
    </div>
  </section>
</body>
</html>
